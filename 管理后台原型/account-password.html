<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>修改密码 — SmartRelay 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: "#2563eb" } } } };
  </script>
  <link rel="stylesheet" href="css/admin-base.css" />
</head>
<body class="admin-body">
  <div id="admin-overlay" class="admin-overlay" aria-hidden="true"></div>

  <div class="admin-layout">
    <aside id="admin-sidebar" class="admin-sidebar" aria-label="侧栏导航">
      <div class="admin-sidebar__head">
        <a href="dashboard.html" class="admin-sidebar__brand" title="SmartRelay 控制台">
          <span class="admin-sidebar__logo">SR</span>
          <span class="admin-sidebar__brand-txt">
            <strong>SmartRelay</strong>
            <span class="admin-sidebar__brand-sub">控制台</span>
          </span>
        </a>
        <button type="button" id="admin-sidebar-toggle" class="admin-sidebar__pin" aria-label="收起菜单" aria-expanded="true">
          <svg class="admin-sidebar__pin-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
          </svg>
        </button>
      </div>
      <nav class="admin-sidebar__nav">
        <a href="dashboard.html" class="admin-sidebar__link" title="数据大屏">
          <svg class="admin-sidebar__ico" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zM14 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z" /></svg>
          <span>数据大屏</span>
        </a>
        <a href="users.html" class="admin-sidebar__link" title="用户管理">
          <svg class="admin-sidebar__ico" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
          <span>用户管理</span>
        </a>
        <a href="devices.html" class="admin-sidebar__link" title="设备管理">
          <svg class="admin-sidebar__ico" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2-6H3m18 4h2m-2 6h2M7 19H5m14 0h2M9 7h6m-6 4h6m-6 4h6M7 5h10a2 2 0 012 2v10a2 2 0 01-2 2H7a2 2 0 01-2-2V7a2 2 0 012-2z" /></svg>
          <span>设备管理</span>
        </a>
        <a href="firmware-ota.html" class="admin-sidebar__link" title="固件管理">
          <svg class="admin-sidebar__ico" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10" /></svg>
          <span>固件管理</span>
        </a>
      </nav>
    </aside>

    <div class="admin-main-col">
      <header class="admin-topbar">
        <div class="admin-topbar__left">
          <button type="button" id="admin-drawer-toggle" class="admin-drawer-toggle lg:hidden" aria-label="打开菜单">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
          </button>
          <h1 class="admin-topbar__title">账号 · 修改密码</h1>
        </div>
        <div class="admin-user-menu">
          <button type="button" id="admin-user-trigger" class="admin-user-trigger" aria-expanded="false" aria-haspopup="true" aria-controls="admin-user-dropdown">
            <span class="admin-user-trigger__dot" aria-hidden="true"></span>
            <span class="admin-user-trigger__name">admin</span>
            <svg class="admin-user-trigger__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div id="admin-user-dropdown" class="admin-user-panel" role="menu">
            <a href="account-password.html" role="menuitem" class="admin-user-panel__item" aria-current="page">修改密码</a>
            <a href="login.html" role="menuitem" class="admin-user-panel__item admin-user-panel__item--danger">退出登录</a>
          </div>
        </div>
      </header>

      <main class="admin-content max-w-xl">
        <p class="text-sm text-slate-600 mb-6">修改成功后，请使用新密码重新登录。</p>

        <form id="account-password-form" class="admin-card p-7 space-y-5 shadow-lg" action="#" method="post" novalidate>
          <div>
            <label for="old-pw" class="block text-sm font-medium text-slate-700 mb-1.5">当前密码</label>
            <div class="relative">
              <input
                id="old-pw"
                name="oldPassword"
                type="password"
                autocomplete="current-password"
                class="w-full rounded-lg border border-slate-300 py-2.5 pl-3 pr-11 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary"
              />
              <button
                type="button"
                class="admin-pw-toggle absolute right-1 top-1/2 -translate-y-1/2 rounded-md p-1.5 text-slate-500 hover:bg-slate-100 hover:text-slate-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary/35"
                data-pw-toggle="old-pw"
                aria-label="显示密码"
                aria-pressed="false"
              >
                <svg data-eye-show class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                <svg data-eye-hide class="hidden h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
              </button>
            </div>
          </div>
          <div>
            <label for="new-pw" class="block text-sm font-medium text-slate-700 mb-1.5">新密码</label>
            <div class="relative">
              <input
                id="new-pw"
                name="newPassword"
                type="password"
                autocomplete="new-password"
                class="w-full rounded-lg border border-slate-300 py-2.5 pl-3 pr-11 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary"
              />
              <button
                type="button"
                class="admin-pw-toggle absolute right-1 top-1/2 -translate-y-1/2 rounded-md p-1.5 text-slate-500 hover:bg-slate-100 hover:text-slate-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary/35"
                data-pw-toggle="new-pw"
                aria-label="显示密码"
                aria-pressed="false"
              >
                <svg data-eye-show class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                <svg data-eye-hide class="hidden h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
              </button>
            </div>
            <p class="mt-1 text-xs text-slate-500">建议 8 位以上，包含字母与数字。</p>
          </div>
          <div>
            <label for="confirm-pw" class="block text-sm font-medium text-slate-700 mb-1.5">确认新密码</label>
            <div class="relative">
              <input
                id="confirm-pw"
                name="confirmPassword"
                type="password"
                autocomplete="new-password"
                class="w-full rounded-lg border border-slate-300 py-2.5 pl-3 pr-11 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary"
              />
              <button
                type="button"
                class="admin-pw-toggle absolute right-1 top-1/2 -translate-y-1/2 rounded-md p-1.5 text-slate-500 hover:bg-slate-100 hover:text-slate-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary/35"
                data-pw-toggle="confirm-pw"
                aria-label="显示密码"
                aria-pressed="false"
              >
                <svg data-eye-show class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                <svg data-eye-hide class="hidden h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
              </button>
            </div>
          </div>
          <div class="flex flex-col sm:flex-row gap-3 pt-2">
            <button type="submit" class="rounded-lg bg-primary text-white font-medium px-5 py-2.5 text-sm hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-primary/40">保存新密码</button>
            <a href="dashboard.html" class="inline-flex justify-center rounded-lg border border-slate-300 bg-white px-5 py-2.5 text-sm text-slate-700 hover:bg-slate-50">取消</a>
          </div>
        </form>
      </main>
    </div>
  </div>

  <script src="js/admin-nav.js"></script>
  <script>
    (function () {
      document.querySelectorAll("[data-pw-toggle]").forEach(function (btn) {
        var id = btn.getAttribute("data-pw-toggle");
        var input = document.getElementById(id);
        if (!input) return;
        var iconShow = btn.querySelector("[data-eye-show]");
        var iconHide = btn.querySelector("[data-eye-hide]");
        btn.addEventListener("click", function () {
          var visible = input.type === "text";
          input.type = visible ? "password" : "text";
          var nowVisible = input.type === "text";
          btn.setAttribute("aria-pressed", nowVisible ? "true" : "false");
          btn.setAttribute("aria-label", nowVisible ? "隐藏密码" : "显示密码");
          if (iconShow && iconHide) {
            iconShow.classList.toggle("hidden", nowVisible);
            iconHide.classList.toggle("hidden", !nowVisible);
          }
        });
      });

      var form = document.getElementById("account-password-form");
      if (form) {
        form.addEventListener("submit", function (e) {
          e.preventDefault();
          var oldV = (document.getElementById("old-pw").value || "").trim();
          var newV = (document.getElementById("new-pw").value || "").trim();
          var confirmV = (document.getElementById("confirm-pw").value || "").trim();
          if (!oldV || !newV || !confirmV) {
            alert("请填写当前密码、新密码与确认密码。");
            return;
          }
          if (newV !== confirmV) {
            alert("两次输入的新密码不一致，请重新确认。");
            return;
          }
          if (newV.length < 8) {
            alert("新密码长度至少为 8 位。");
            return;
          }
          alert("密码已更新，请使用新密码重新登录。");
          window.location.href = "login.html";
        });
      }
    })();
  </script>
</body>
</html>
