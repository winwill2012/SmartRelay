<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>设备操作日志 — SmartRelay 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: "#2563eb" } } } };
  </script>
  <link rel="stylesheet" href="css/admin-base.css" />
</head>
<body class="admin-body">
  <div id="admin-overlay" class="admin-overlay" aria-hidden="true"></div>

  <div class="admin-layout">
    <aside id="admin-sidebar" class="admin-sidebar" aria-label="侧栏导航">
      <div class="admin-sidebar__head">
        <a href="dashboard.html" class="admin-sidebar__brand" title="SmartRelay 控制台">
          <span class="admin-sidebar__logo">SR</span>
          <span class="admin-sidebar__brand-txt">
            <strong>SmartRelay</strong>
            <span class="admin-sidebar__brand-sub">控制台</span>
          </span>
        </a>
        <button type="button" id="admin-sidebar-toggle" class="admin-sidebar__pin" aria-label="收起菜单" aria-expanded="true">
          <svg class="admin-sidebar__pin-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
          </svg>
        </button>
      </div>
      <nav class="admin-sidebar__nav">
        <a href="dashboard.html" class="admin-sidebar__link" title="数据大屏">
          <svg class="admin-sidebar__ico" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zM14 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z" /></svg>
          <span>数据大屏</span>
        </a>
        <a href="users.html" class="admin-sidebar__link" title="用户管理">
          <svg class="admin-sidebar__ico" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
          <span>用户管理</span>
        </a>
        <a href="devices.html" class="admin-sidebar__link is-active" title="设备管理">
          <svg class="admin-sidebar__ico" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2-6H3m18 4h2m-2 6h2M7 19H5m14 0h2M9 7h6m-6 4h6m-6 4h6M7 5h10a2 2 0 012 2v10a2 2 0 01-2 2H7a2 2 0 01-2-2V7a2 2 0 012-2z" /></svg>
          <span>设备管理</span>
        </a>
        <a href="firmware-ota.html" class="admin-sidebar__link" title="固件管理">
          <svg class="admin-sidebar__ico" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10" /></svg>
          <span>固件管理</span>
        </a>
      </nav>
    </aside>

    <div class="admin-main-col">
      <header class="admin-topbar">
        <div class="admin-topbar__left">
          <button type="button" id="admin-drawer-toggle" class="admin-drawer-toggle lg:hidden" aria-label="打开菜单">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
          </button>
          <h1 class="admin-topbar__title">设备操作日志</h1>
        </div>
        <div class="admin-user-menu">
          <button type="button" id="admin-user-trigger" class="admin-user-trigger" aria-expanded="false" aria-haspopup="true" aria-controls="admin-user-dropdown">
            <span class="admin-user-trigger__dot" aria-hidden="true"></span>
            <span class="admin-user-trigger__name">admin</span>
            <svg class="admin-user-trigger__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div id="admin-user-dropdown" class="admin-user-panel" role="menu">
            <a href="account-password.html" role="menuitem" class="admin-user-panel__item">修改密码</a>
            <a href="login.html" role="menuitem" class="admin-user-panel__item admin-user-panel__item--danger">退出登录</a>
          </div>
        </div>
      </header>

      <main class="admin-content">
        <nav class="text-sm text-slate-600 mb-4" aria-label="面包屑">
          <a href="devices.html" class="text-primary hover:underline">设备管理</a>
          <span class="mx-1.5 text-slate-400">/</span>
          <span class="text-slate-800">操作日志</span>
        </nav>

        <div class="admin-card p-4 mb-4 flex flex-col lg:flex-row lg:items-end gap-4">
          <div class="flex-1 grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label for="filter-device" class="block text-xs font-medium text-slate-600 mb-1">设备编号</label>
              <input id="filter-device" type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm font-mono" placeholder="设备编号" />
            </div>
            <div>
              <label for="filter-range" class="block text-xs font-medium text-slate-600 mb-1">时间范围</label>
              <input id="filter-range" type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="最近 7 天" disabled />
            </div>
          </div>
          <div class="flex gap-2">
            <button type="button" id="apply-filter" class="rounded-lg bg-primary text-white px-4 py-2 text-sm font-medium hover:bg-blue-600">应用筛选</button>
            <a href="devices.html" class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm text-slate-700">返回列表</a>
          </div>
        </div>

        <div class="admin-card px-4 py-3 mb-4 text-sm text-slate-700 bg-slate-50/80">
          <span class="font-medium text-slate-900">当前设备</span>
          <span id="current-device-label" class="ml-2 font-mono text-primary">—</span>
        </div>

        <div class="admin-table-wrap">
          <table class="min-w-[640px] w-full text-left text-sm">
            <thead class="bg-slate-50 text-slate-600 border-b border-slate-200">
              <tr>
                <th class="px-4 py-3 font-medium">时间</th>
                <th class="px-4 py-3 font-medium">来源</th>
                <th class="px-4 py-3 font-medium">动作</th>
                <th class="px-4 py-3 font-medium">结果</th>
                <th class="px-4 py-3 font-medium">详情</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 bg-white">
              <tr>
                <td class="px-4 py-3 text-slate-700 tabular-nums whitespace-nowrap">2026-04-08 10:01:22</td>
                <td class="px-4 py-3">小程序</td>
                <td class="px-4 py-3">继电器 ON</td>
                <td class="px-4 py-3"><span class="text-emerald-600">成功</span></td>
                <td class="px-4 py-3 text-slate-600 text-xs">#M001</td>
              </tr>
              <tr>
                <td class="px-4 py-3 text-slate-700 tabular-nums whitespace-nowrap">2026-04-08 08:30:05</td>
                <td class="px-4 py-3">定时任务</td>
                <td class="px-4 py-3">继电器 OFF</td>
                <td class="px-4 py-3"><span class="text-emerald-600">成功</span></td>
                <td class="px-4 py-3 text-slate-600 text-xs">定时任务 #4</td>
              </tr>
              <tr>
                <td class="px-4 py-3 text-slate-700 tabular-nums whitespace-nowrap">2026-04-07 21:15:44</td>
                <td class="px-4 py-3">小程序</td>
                <td class="px-4 py-3">继电器 OFF</td>
                <td class="px-4 py-3"><span class="text-emerald-600">成功</span></td>
                <td class="px-4 py-3 text-slate-600 text-xs">#M002</td>
              </tr>
              <tr>
                <td class="px-4 py-3 text-slate-700 tabular-nums whitespace-nowrap">2026-04-07 12:00:00</td>
                <td class="px-4 py-3">OTA</td>
                <td class="px-4 py-3">固件升级完成</td>
                <td class="px-4 py-3"><span class="text-emerald-600">成功</span></td>
                <td class="px-4 py-3 text-slate-600 text-xs">1.4.1 → 1.4.2</td>
              </tr>
            </tbody>
          </table>
        </div>

        <p class="mt-4 text-xs text-slate-500">共 4 条 · 支持分页加载更多</p>
      </main>
    </div>
  </div>

  <script src="js/admin-nav.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var id = params.get("deviceId") || "dev_c3_a1b2c3";
      var input = document.getElementById("filter-device");
      var label = document.getElementById("current-device-label");
      if (input) input.value = id;
      if (label) label.textContent = id;
      document.getElementById("apply-filter")?.addEventListener("click", function () {
        var v = (input && input.value.trim()) || id;
        if (label) label.textContent = v;
        var u = new URL(window.location.href);
        u.searchParams.set("deviceId", v);
        window.history.replaceState({}, "", u);
      });
    })();
  </script>
</body>
</html>
