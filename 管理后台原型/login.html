<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理员登录 — SmartRelay</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: "#2563eb" } } } };
  </script>
  <link rel="stylesheet" href="css/admin-base.css" />
</head>
<body class="admin-body">
  <div class="min-h-screen flex flex-col items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <p class="text-xs font-medium uppercase tracking-wider text-slate-500">SmartRelay · 管理后台</p>
        <h1 class="text-2xl font-bold text-slate-900 mt-2">管理员登录</h1>
      </div>

      <form action="dashboard.html" method="get" class="admin-card p-7 space-y-5 shadow-xl">
        <div>
          <label for="username" class="block text-sm font-medium text-slate-700 mb-1.5">账号</label>
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            placeholder="请输入账号"
            class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary"
          />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">密码</label>
          <div class="relative">
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="请输入密码"
              class="w-full rounded-lg border border-slate-300 py-2.5 pl-3 pr-11 text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary"
            />
            <button
              type="button"
              id="toggle-password"
              class="absolute right-1 top-1/2 -translate-y-1/2 p-2 rounded-md text-slate-500 hover:text-slate-800 hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-primary/30"
              aria-label="显示密码"
              aria-pressed="false"
            >
              <span id="icon-eye" class="block" aria-hidden="true">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
              </span>
              <span id="icon-eye-off" class="hidden" aria-hidden="true">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                </svg>
              </span>
            </button>
          </div>
        </div>
        <button type="submit" class="w-full rounded-lg bg-primary text-white font-medium py-2.5 hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-primary/40 transition">
          登录
        </button>
      </form>
      <p class="text-center text-xs text-slate-500 mt-6">© SmartRelay</p>
    </div>
  </div>
  <script>
    (function () {
      var input = document.getElementById("password");
      var btn = document.getElementById("toggle-password");
      var iconEye = document.getElementById("icon-eye");
      var iconEyeOff = document.getElementById("icon-eye-off");
      if (!input || !btn) return;
      btn.addEventListener("click", function () {
        var show = input.type === "password";
        input.type = show ? "text" : "password";
        btn.setAttribute("aria-pressed", show ? "true" : "false");
        btn.setAttribute("aria-label", show ? "隐藏密码" : "显示密码");
        iconEye.classList.toggle("hidden", show);
        iconEyeOff.classList.toggle("hidden", !show);
      });
    })();
  </script>
</body>
</html>
