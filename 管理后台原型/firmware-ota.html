  <div id="fw-notes-popover" class="admin-firmware-popover" role="dialog" aria-modal="false" aria-labelledby="fw-notes-title" hidden>
    <div class="flex justify-between items-start gap-3 mb-2">
      <h3 id="fw-notes-title" class="text-sm font-bold text-slate-900 pr-2"></h3>
      <button type="button" id="fw-notes-close" class="shrink-0 rounded-md p-1 text-slate-400 hover:bg-slate-100 hover:text-slate-700" aria-label="关闭">

      </button>
    </div>
    <ul id="fw-notes-list" class="text-sm text-slate-600 space-y-1.5 list-disc pl-4"></ul>
    <p class="text-xs text-slate-400 mt-3 leading-relaxed">仅列表中已启用的版本会对设备开放更新；灰度等策略以服务端配置为准。</p>
  </div>

  <script src="js/admin-nav.js"></script>
  <script>
    (function () {
      var NOTES = {
        "1.4.2": [
          "优化远程连接稳定性与 OTA 校验流程",
          "修复定时任务偶发未触发的问题",
          "调整板载 LED 呼吸灯占空比"
        ],
        "1.4.1": [
          "安全相关补丁",
          "MQTT 重连与心跳策略优化"
        ],
        "1.4.0": [
          "ESP32-C3 首批量产硬件适配",
          "基础继电器远程与蓝牙配网能力"
        ]
      };

      var fwTableBody = document.getElementById("fw-table-body");

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      /** 解析主版本号数字段，支持 1.4.3、v1.4.3、1.4.3-beta 等形式（后缀不参与比较） */
      function parseVersionParts(str) {
        var s = String(str || "")
          .trim()
          .replace(/^v/i, "");
        if (!s) return null;
        var m = s.match(/^(\d+(?:\.\d+)*)/);
        if (!m) return null;
        return m[1].split(".").map(function (x) {
          var n = parseInt(x, 10);
          return isNaN(n) ? 0 : n;
        });
      }

      function compareVersionParts(a, b) {
        var len = Math.max(a.length, b.length);
        for (var i = 0; i < len; i++) {
          var va = i < a.length ? a[i] : 0;
          var vb = i < b.length ? b[i] : 0;
          if (va !== vb) return va - vb;
        }
        return 0;
      }

      function compareVersionStrings(a, b) {
        var pa = parseVersionParts(a);
        var pb = parseVersionParts(b);
        if (!pa || !pb) return NaN;
        return compareVersionParts(pa, pb);
      }

      function getHighestTableVersion() {
        var links = fwTableBody.querySelectorAll(".fw-version-link");
        var best = null;
        for (var i = 0; i < links.length; i++) {
          var v = links[i].getAttribute("data-fw-version");
          if (!v || !parseVersionParts(v)) continue;
          if (best === null || compareVersionStrings(v, best) > 0) best = v;
        }
        return best;
      }

      function validateNewVersionOrder(ver) {
        var parts = parseVersionParts(ver);
        if (!parts || parts.length === 0) {
          return { ok: false, message: "版本号格式无效，请使用数字与点分隔，例如 1.4.3。" };
        }
        var highest = getHighestTableVersion();
        if (highest === null) return { ok: true };
        var cmp = compareVersionStrings(ver, highest);
        if (isNaN(cmp) || cmp <= 0) {
          return {
            ok: false,
            message:
              "新版本号必须高于列表中已有最高版本（当前最高：" +
              highest +
              "）。请填写大于 " +
              highest +
              " 的版本号。"
          };
        }
        return { ok: true };
      }

      function formatNow() {
        var d = new Date();
        function pad(n) {
          return n < 10 ? "0" + n : String(n);
        }
        return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) + " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
      }

      function toggleCellHtml(ver, checked) {
        var v = escapeHtml(ver);
        var chk = checked ? " checked" : "";
        return (
          '<label class="inline-flex cursor-pointer items-center gap-2" title="启用后，设备端可接收并更新到该版本">' +
          '<input type="checkbox" class="peer sr-only fw-enable-toggle" data-fw-version="' +
          v +
          '"' +
          chk +
          ' aria-label="' +
          v +
          ' 是否对设备开放更新" />' +
          '<span class="flex h-6 w-11 items-center rounded-full bg-slate-200 p-0.5 transition-colors peer-checked:bg-emerald-500 peer-checked:justify-end">' +
          '<span class="block h-5 w-5 rounded-full bg-white shadow-sm shrink-0"></span></span>' +
          '<span class="text-xs text-slate-500 peer-checked:hidden">未启用</span>' +
          '<span class="text-xs font-medium text-emerald-700 hidden peer-checked:inline">已启用</span>' +
          "</label>"
        );
      }

      function prependFirmwareRow(ver, uploadTime, enabled) {
        var tbody = document.getElementById("fw-table-body");
        var tr = document.createElement("tr");
        tr.className = "hover:bg-slate-50/80";
        var v = escapeHtml(ver);
        tr.innerHTML =
          '<td class="px-4 py-3">' +
          '<button type="button" class="fw-version-link" data-fw-version="' +
          v +
          '">' +
          v +
          "</button></td>" +
          '<td class="px-4 py-3 text-slate-700 tabular-nums">' +
          escapeHtml(uploadTime) +
          "</td>" +
          '<td class="px-4 py-3">' +
          toggleCellHtml(ver, enabled) +
          "</td>" +
          '<td class="px-4 py-3 text-right tabular-nums font-semibold text-slate-600">0</td>';
        tbody.insertBefore(tr, tbody.firstChild);
        return tr;
      }

      var pop = document.getElementById("fw-notes-popover");
      var titleEl = document.getElementById("fw-notes-title");
      var listEl = document.getElementById("fw-notes-list");
      var closeBtn = document.getElementById("fw-notes-close");
      var openVer = null;

      function hidePop() {
        openVer = null;
        pop.classList.remove("is-visible");
        pop.setAttribute("hidden", "");
      }

      function layoutPopover(anchorEl) {
        requestAnimationFrame(function () {
          var r = anchorEl.getBoundingClientRect();
          var w = pop.offsetWidth;
          var h = pop.offsetHeight;
          var left = r.left;
          var top = r.bottom + 8;
          if (left + w > window.innerWidth - 12) left = window.innerWidth - w - 12;
          if (left < 12) left = 12;
          if (top + h > window.innerHeight - 12) top = r.top - h - 8;
          if (top < 12) top = 12;
          pop.style.left = left + "px";
          pop.style.top = top + "px";
        });
      }

      function showPop(ver, anchorEl) {
        var lines = NOTES[ver] || ["暂无该版本的详细说明。"];
        titleEl.textContent = "v" + ver + " 更新说明";
        listEl.innerHTML = "";
        lines.forEach(function (t) {
          var li = document.createElement("li");
          li.textContent = t;
          listEl.appendChild(li);
        });
        pop.removeAttribute("hidden");
        pop.classList.add("is-visible");
        openVer = ver;
        layoutPopover(anchorEl);
      }

      function findVersionAnchor(ver) {
        var links = fwTableBody.querySelectorAll(".fw-version-link");
        for (var i = 0; i < links.length; i++) {
          if (links[i].getAttribute("data-fw-version") === ver) return links[i];
        }
        return null;
      }

      function isVersionInTable(ver) {
        return findVersionAnchor(ver) !== null;
      }
      fwTableBody.addEventListener("click", function (e) {
        var btn = e.target.closest(".fw-version-link");
        if (!btn || !fwTableBody.contains(btn)) return;
        e.stopPropagation();
        var v = btn.getAttribute("data-fw-version");
        if (openVer === v && pop.classList.contains("is-visible")) {
          hidePop();
          return;
        }
        showPop(v, btn);
      });

      fwTableBody.addEventListener("change", function (e) {
        var t = e.target;
        if (!t.classList.contains("fw-enable-toggle")) return;
        var ver = t.getAttribute("data-fw-version") || "";
        var newVal = t.checked;
        t.checked = !newVal;
        var msg = newVal
          ? "确定启用 v" + ver + "？启用后，设备端可拉取并更新到该版本。"
          : "确定关闭 v" + ver + "？关闭后，设备端将无法拉取该版本。";
        if (window.confirm(msg)) {
          t.checked = newVal;
        }
      });

      closeBtn.addEventListener("click", hidePop);
      document.addEventListener("click", function (e) {
        if (!pop.classList.contains("is-visible")) return;
        if (e.target.closest("#fw-notes-popover") || e.target.closest(".fw-version-link")) return;
        hidePop();
      });
      document.addEventListener("keydown", function (e) {
        if (e.key !== "Escape") return;
        var dlg = document.getElementById("fw-release-dialog");
        if (dlg && dlg.open) return;
        hidePop();
      });

      window.addEventListener(
        "resize",
        function () {
          if (!openVer || !pop.classList.contains("is-visible")) return;
          var btn = findVersionAnchor(openVer);
          if (btn) layoutPopover(btn);
        },
        { passive: true }
      );

      var fileInput = document.getElementById("fw-file");
      var fileName = document.getElementById("fw-file-name");
      fileInput.addEventListener("change", function () {
        var f = fileInput.files && fileInput.files[0];
        fileName.textContent = f ? f.name : "未选择文件";
        fileName.classList.toggle("text-slate-900", !!f);
        fileName.classList.toggle("font-medium", !!f);
      });

      var releaseDlg = document.getElementById("fw-release-dialog");
      var releaseForm = document.getElementById("fw-release-form");
      var changelogEl = document.getElementById("fw-release-changelog");

      document.getElementById("fw-publish-open").addEventListener("click", function () {
        var f = fileInput.files && fileInput.files[0];
        var ver = (document.getElementById("fw-version-input").value || "").trim();
        if (!f) {
          alert("请先选择固件文件（.bin）。");
          return;
        }
        if (!ver) {
          alert("请填写版本号。");
          return;
        }
        if (!parseVersionParts(ver)) {
          alert("版本号格式无效，请使用数字与点分隔，例如 1.4.3。");
          document.getElementById("fw-version-input").focus();
          return;
        }
        if (isVersionInTable(ver)) {
          alert("列表中已存在该版本号，请修改版本号后重试。");
          document.getElementById("fw-version-input").focus();
          return;
        }
        var orderCheck = validateNewVersionOrder(ver);
        if (!orderCheck.ok) {
          alert(orderCheck.message);
          document.getElementById("fw-version-input").focus();
          return;
        }
        document.getElementById("dlg-file-summary").textContent = f.name;
        document.getElementById("dlg-ver-summary").textContent = ver;
        changelogEl.value = "";
        if (releaseDlg.showModal) releaseDlg.showModal();
        requestAnimationFrame(function () {
          changelogEl.focus();
        });
      });

      document.getElementById("fw-release-cancel").addEventListener("click", function () {
        if (releaseDlg.close) releaseDlg.close();
      });

      releaseForm.addEventListener("submit", function (e) {
        e.preventDefault();
        var log = (changelogEl.value || "").trim();
        if (!log) {
          alert("请填写固件更新日志。");
          changelogEl.focus();
          return;
        }
        var f = fileInput.files && fileInput.files[0];
        var ver = (document.getElementById("fw-version-input").value || "").trim();
        if (!f) {
          alert("未找到固件文件，请重新选择后再保存。");
          if (releaseDlg.close) releaseDlg.close();
          return;
        }
        if (!ver) {
          alert("请填写版本号。");
          if (releaseDlg.close) releaseDlg.close();
          return;
        }
        if (!parseVersionParts(ver)) {
          alert("版本号格式无效，请使用数字与点分隔，例如 1.4.3。");
          document.getElementById("fw-version-input").focus();
          return;
        }
        if (isVersionInTable(ver)) {
          alert("列表中已存在该版本号，请修改版本号后重试。");
          changelogEl.focus();
          return;
        }
        var orderCheckSubmit = validateNewVersionOrder(ver);
        if (!orderCheckSubmit.ok) {
          alert(orderCheckSubmit.message);
          document.getElementById("fw-version-input").focus();
          return;
        }
        var lines = log
          .split(/\r?\n/)
          .map(function (s) {
            return s.trim();
          })
          .filter(Boolean);
        NOTES[ver] = lines.length ? lines : [log.trim()];
        var newTr = prependFirmwareRow(ver, formatNow(), false);
        if (newTr && typeof newTr.scrollIntoView === "function") {
          requestAnimationFrame(function () {
            newTr.scrollIntoView({ behavior: "smooth", block: "nearest" });
          });
        }
        alert(
          "已将「" +
            (f ? f.name : "") +
            "」v" +
            ver +
            " 提交上传。\n\n该版本默认未启用，请在列表中开启「是否启用」后，设备端才可拉取更新。\n\n更新日志：\n" +
            log.slice(0, 200) +
            (log.length > 200 ? "…" : "")
        );
        fileInput.value = "";
        fileName.textContent = "未选择文件";
        fileName.classList.remove("text-slate-900", "font-medium");
        document.getElementById("fw-version-input").value = "";
        if (releaseDlg.close) releaseDlg.close();
      });
    })();
  </script>
</body>
</html>
