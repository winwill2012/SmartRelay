# 加入 iot.welinklab.com 的443 server 块内（需写在 location / 之前，优先匹配）
# 将 /smart-relay/ 前缀剥掉后转发到本机 uvicorn，对外 API 为：
#   https://iot.welinklab.com/smart-relay/api/v1/...
#   https://iot.welinklab.com/smart-relay/health
#   https://iot.welinklab.com/smart-relay/static/firmware/...

location /smart-relay/ {
    proxy_pass http://127.0.0.1:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;
    client_max_body_size 64m;
}
