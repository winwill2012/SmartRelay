<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>固件更新 — SmartRelay</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#2563eb" }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="css/prototype-base.css" />
</head>
<body class="bg-slate-200">
  <div class="mp-shell">
    <div class="mp-status">
      <span>9:41</span>
      <span class="flex gap-1">📶 🔋</span>
    </div>
    <div class="mp-nav">
      <a href="device-detail.html" class="mp-nav-back">返回</a>
      <span class="mp-nav-title">固件更新</span>
    </div>

    <main class="px-4 pb-10">
      <p class="text-xs text-slate-500 mt-3">客厅灯带 · <span class="font-mono">SR-A1B2C3D</span></p>

      <div id="fw-loading" class="mt-8 flex flex-col items-center rounded-2xl bg-white border border-slate-100 py-12 px-4 shadow-sm">
        <span class="inline-block h-10 w-10 animate-spin rounded-full border-[3px] border-slate-200 border-t-primary"></span>
        <p class="mt-4 text-sm font-medium text-slate-800">正在查询最新固件…</p>
        <p class="mt-1 text-xs text-slate-500 text-center">请稍候</p>
      </div>

      <div id="fw-result" class="hidden mt-6 space-y-4" aria-live="polite">
        <div class="rounded-2xl bg-white border border-slate-100 p-4 shadow-sm">
          <dl class="space-y-3 text-sm">
            <div class="flex justify-between gap-4">
              <dt class="text-slate-500">当前固件</dt>
              <dd class="text-slate-900 font-mono">v1.0.0</dd>
            </div>
            <div class="flex justify-between gap-4">
              <dt class="text-slate-500">服务器最新</dt>
              <dd class="text-slate-900 font-mono text-primary font-semibold" id="fw-latest-ver">v1.1.0</dd>
            </div>
            <div class="flex justify-between gap-4">
              <dt class="text-slate-500">发布时间</dt>
              <dd class="text-slate-700 text-right text-xs">2026-04-01</dd>
            </div>
            <div class="pt-2 border-t border-slate-50">
              <p class="text-xs text-slate-500 leading-relaxed">将结合设备型号与当前版本，为您匹配可用升级包。</p>
            </div>
          </dl>
        </div>

        <div id="fw-has-update" class="hidden rounded-xl bg-amber-50 border border-amber-200 px-4 py-3 text-sm text-amber-950">
          检测到新版本，升级过程请勿断电，并保持手机靠近设备。
        </div>

        <div id="fw-no-update" class="hidden rounded-xl bg-emerald-50 border border-emerald-200 px-4 py-3 text-sm text-emerald-900">
          当前已是最新固件。
        </div>

        <button type="button" id="fw-btn-update" class="hidden w-full rounded-xl bg-[#2563eb] py-3.5 text-sm font-semibold text-white shadow-md shadow-blue-600/25 ring-1 ring-blue-700/15 active:brightness-95">
          立即更新
        </button>
      </div>
    </main>
  </div>
  <script>
    (function () {
      var loading = document.getElementById("fw-loading");
      var result = document.getElementById("fw-result");
      var hasUpdate = document.getElementById("fw-has-update");
      var noUpdate = document.getElementById("fw-no-update");
      var btnUpdate = document.getElementById("fw-btn-update");

      window.setTimeout(function () {
        loading.classList.add("hidden");
        result.classList.remove("hidden");

        var latest = "v1.1.0";
        document.getElementById("fw-latest-ver").textContent = latest;
        hasUpdate.classList.remove("hidden");
        btnUpdate.classList.remove("hidden");

        btnUpdate.addEventListener("click", function () {
          alert("将开始固件升级，请保持设备通电并尽量靠近手机。");
        });
      }, 1400);
    })();
  </script>
</body>
</html>
