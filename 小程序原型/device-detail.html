<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>设备详情 — SmartRelay</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/prototype-base.css" />
</head>
<body class="bg-slate-200">
  <div class="mp-shell">
    <div class="mp-status">
      <span>9:41</span>
      <span class="flex gap-1">📶 🔋</span>
    </div>
    <div class="mp-nav">
      <a href="devices.html" class="mp-nav-back">返回</a>
      <span class="mp-nav-title">设备详情</span>
    </div>

    <main class="px-4 pb-10">
      <section class="mt-4 rounded-2xl bg-white p-5 border border-slate-100 shadow-sm">
        <div class="flex items-center justify-between">
          <div>
            <h1 class="text-lg font-semibold text-slate-900">客厅灯带</h1>
            <p class="text-xs text-slate-500 mt-1 font-mono">SR-A1B2C3D</p>
          </div>
          <span class="inline-flex items-center gap-1 rounded-full bg-emerald-50 px-2.5 py-1 text-xs font-medium text-emerald-700">
            <span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span>在线
          </span>
        </div>

        <div class="mt-8 flex flex-col items-center">
          <button type="button" data-demo-switch aria-pressed="true" class="demo-switch-track demo-switch-wide rounded-full" aria-label="远程开关">
            <span class="demo-knob"></span>
          </button>
          <p class="text-sm font-medium text-emerald-700 mt-4">继电器 · 开启</p>
        </div>
      </section>

      <section class="mt-4 rounded-2xl bg-white overflow-hidden border border-slate-100 shadow-sm">
        <a href="device-rename.html" class="flex items-center justify-between px-4 py-4 border-b border-slate-50 active:bg-slate-50">
          <span class="text-slate-800">修改备注名</span>
          <span class="text-slate-400">›</span>
        </a>
        <a href="schedules.html" class="flex items-center justify-between px-4 py-4 border-b border-slate-50 active:bg-slate-50">
          <span class="text-slate-800">定时任务</span>
          <span class="text-slate-400 text-sm">最多 10 条 ›</span>
        </a>
        <a href="logs.html" class="flex items-center justify-between px-4 py-4 border-b border-slate-50 active:bg-slate-50">
          <span class="text-slate-800">操作日志</span>
          <span class="text-slate-400">›</span>
        </a>
        <a href="firmware.html" class="flex items-center justify-between px-4 py-4 active:bg-slate-50">
          <span class="text-slate-800">检查更新</span>
          <span class="text-slate-400 text-sm">当前版本号 ›</span>
        </a>
      </section>

      <section class="mt-4 rounded-2xl bg-white overflow-hidden border border-slate-100 shadow-sm">
        <button type="button" class="w-full flex items-center justify-between px-4 py-4 text-left active:bg-slate-50">
          <span class="text-slate-800">分享给微信好友</span>
          <span class="text-slate-400">›</span>
        </button>
      </section>

      <button type="button" class="mt-6 w-full rounded-xl border border-red-200 bg-white py-3.5 text-sm font-medium text-red-600 active:bg-red-50">
        解绑设备
      </button>
    </main>
  </div>
  <script src="js/prototype-nav.js"></script>
</body>
</html>
