<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>新建定时 — SmartRelay</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#2563eb" }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="css/prototype-base.css" />
</head>
<body class="bg-slate-200">
  <div class="mp-shell">
    <div class="mp-status">
      <span>9:41</span>
      <span class="flex gap-1">📶 🔋</span>
    </div>
    <div class="mp-nav">
      <a href="schedules.html" class="mp-nav-back">取消</a>
      <span class="mp-nav-title">新建定时</span>
    </div>

    <main class="px-4 pb-8 pt-2">
      <section class="mt-3 rounded-2xl bg-white border border-slate-100 shadow-sm p-4 space-y-5">
        <div>
          <label class="text-xs font-medium text-slate-600">名称（可选）</label>
          <input type="text" placeholder="例如：每晚关灯" class="mt-1.5 w-full rounded-xl border border-slate-200 bg-slate-50/80 px-4 py-3 text-sm text-slate-900 placeholder:text-slate-400 focus:border-primary focus:bg-white focus:outline-none focus:ring-2 focus:ring-primary/20" />
        </div>
        <div>
          <label class="text-xs font-medium text-slate-600">重复</label>
          <div id="repeat-group" class="relative z-10 mt-2 flex flex-wrap gap-2" role="radiogroup" aria-label="重复方式">
            <button type="button" data-repeat="once" aria-pressed="true" class="repeat-btn cursor-pointer select-none rounded-full bg-[#2563eb] px-3.5 py-2 text-sm font-medium text-white shadow-sm ring-1 ring-blue-700/20 active:opacity-90">一次</button>
            <button type="button" data-repeat="daily" aria-pressed="false" class="repeat-btn cursor-pointer select-none rounded-full border border-slate-200 bg-white px-3.5 py-2 text-sm font-medium text-slate-700 shadow-sm hover:bg-slate-50 active:opacity-90">每天</button>
            <button type="button" data-repeat="weekly" aria-pressed="false" class="repeat-btn cursor-pointer select-none rounded-full border border-slate-200 bg-white px-3.5 py-2 text-sm font-medium text-slate-700 shadow-sm hover:bg-slate-50 active:opacity-90">每周</button>
            <button type="button" data-repeat="monthly" aria-pressed="false" class="repeat-btn cursor-pointer select-none rounded-full border border-slate-200 bg-white px-3.5 py-2 text-sm font-medium text-slate-700 shadow-sm hover:bg-slate-50 active:opacity-90">每月</button>
          </div>

          <div id="weekly-panel" class="hidden mt-4 rounded-xl border border-slate-100 bg-slate-50/80 p-3">
            <p class="text-xs font-medium text-slate-600 mb-2">选择星期（可多选）</p>
            <div id="weekday-chips" class="flex flex-wrap gap-2" role="group" aria-label="每周星期">
              <button type="button" data-weekday="1" class="week-chip rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 active:opacity-90">周一</button>
              <button type="button" data-weekday="2" class="week-chip rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 active:opacity-90">周二</button>
              <button type="button" data-weekday="3" class="week-chip rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 active:opacity-90">周三</button>
              <button type="button" data-weekday="4" class="week-chip rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 active:opacity-90">周四</button>
              <button type="button" data-weekday="5" class="week-chip rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 active:opacity-90">周五</button>
              <button type="button" data-weekday="6" class="week-chip rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 active:opacity-90">周六</button>
              <button type="button" data-weekday="0" class="week-chip rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 active:opacity-90">周日</button>
            </div>
          </div>

          <div id="monthly-panel" class="hidden mt-4 rounded-xl border border-slate-100 bg-slate-50/80 p-3">
            <p class="text-xs font-medium text-slate-600 mb-2">选择每月哪几天（可多选）</p>
            <div id="monthday-grid" class="grid grid-cols-7 gap-1.5" role="group" aria-label="每月日期"></div>
            <p class="text-[11px] text-slate-400 mt-2">点击数字切换；月末 29–31 日按当月实际天数执行。</p>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-xs font-medium text-slate-600">执行时间</label>
            <input type="time" value="22:00" class="mt-1.5 w-full rounded-xl border border-slate-200 bg-white px-3 py-3 text-sm text-slate-900 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20" />
          </div>
          <div>
            <label class="text-xs font-medium text-slate-600">动作</label>
            <select class="mt-1.5 w-full rounded-xl border border-slate-200 bg-white px-3 py-3 text-sm text-slate-900 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20">
              <option>关闭</option>
              <option>打开</option>
            </select>
          </div>
        </div>
      </section>

      <a href="schedules.html" class="mt-6 flex w-full items-center justify-center rounded-xl bg-[#2563eb] py-3.5 text-sm font-semibold text-white shadow-md shadow-blue-600/25 ring-1 ring-blue-700/15 active:brightness-95">
        保存
      </a>
    </main>
  </div>
  <script>
    (function () {
      var CL_ON =
        "repeat-btn cursor-pointer select-none rounded-full bg-[#2563eb] px-3.5 py-2 text-sm font-medium text-white shadow-sm ring-1 ring-blue-700/20 active:opacity-90";
      var CL_OFF =
        "repeat-btn cursor-pointer select-none rounded-full border border-slate-200 bg-white px-3.5 py-2 text-sm font-medium text-slate-700 shadow-sm hover:bg-slate-50 active:opacity-90";
      var W_ON =
        "week-chip rounded-lg border border-[#2563eb] bg-[#2563eb] px-3 py-1.5 text-xs font-medium text-white shadow-sm active:opacity-90";
      var W_OFF =
        "week-chip rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 active:opacity-90";
      var M_ON =
        "month-chip min-h-[2.25rem] rounded-lg border border-[#2563eb] bg-[#2563eb] text-xs font-semibold text-white shadow-sm active:opacity-90";
      var M_OFF =
        "month-chip min-h-[2.25rem] rounded-lg border border-slate-200 bg-white text-xs font-semibold text-slate-700 active:opacity-90";

      var group = document.getElementById("repeat-group");
      var weeklyPanel = document.getElementById("weekly-panel");
      var monthlyPanel = document.getElementById("monthly-panel");
      var monthGrid = document.getElementById("monthday-grid");

      for (var d = 1; d <= 31; d++) {
        var b = document.createElement("button");
        b.type = "button";
        b.setAttribute("data-monthday", String(d));
        b.className = M_OFF;
        b.textContent = String(d);
        b.setAttribute("aria-pressed", "false");
        monthGrid.appendChild(b);
      }

      function syncRepeatPanels(mode) {
        weeklyPanel.classList.toggle("hidden", mode !== "weekly");
        monthlyPanel.classList.toggle("hidden", mode !== "monthly");
      }

      group.querySelectorAll(".repeat-btn").forEach(function (btn) {
        btn.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          var mode = btn.getAttribute("data-repeat");
          group.querySelectorAll(".repeat-btn").forEach(function (b) {
            b.setAttribute("aria-pressed", "false");
            b.className = CL_OFF;
          });
          btn.setAttribute("aria-pressed", "true");
          btn.className = CL_ON;
          syncRepeatPanels(mode);
        });
      });

      document.getElementById("weekday-chips").querySelectorAll(".week-chip").forEach(function (chip) {
        chip.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          var on = chip.getAttribute("aria-pressed") === "true";
          chip.setAttribute("aria-pressed", on ? "false" : "true");
          chip.className = on ? W_OFF : W_ON;
        });
      });

      monthGrid.querySelectorAll(".month-chip").forEach(function (chip) {
        chip.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          var on = chip.getAttribute("aria-pressed") === "true";
          chip.setAttribute("aria-pressed", on ? "false" : "true");
          chip.className = on ? M_OFF : M_ON;
        });
      });

      syncRepeatPanels("once");
    })();
  </script>
</body>
</html>
