<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>首页 — SmartRelay</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/prototype-base.css" />
</head>
<body class="bg-slate-200">
  <div class="mp-shell relative flex min-h-screen flex-col">
    <div class="mp-status">
      <span>9:41</span>
      <span class="flex gap-1">📶 🔋</span>
    </div>
    <div class="mp-nav">
      <a href="index.html" class="mp-nav-back text-xs text-slate-400">导航</a>
      <span class="mp-nav-title">首页</span>
    </div>

    <main class="flex flex-1 flex-col px-4 pt-3 mp-content-pad pb-28">
      <!-- 未登录：空列表 + 居中引导 -->
      <div id="home-empty" class="flex flex-1 flex-col items-center justify-center px-6 py-16 text-center">
        <p class="text-base font-medium text-slate-700">登录以绑定设备</p>
        <p class="mt-2 text-sm text-slate-500">登录后可添加设备并远程控制</p>
        <a href="login.html" class="mt-10 inline-flex items-center justify-center rounded-full bg-[#2563eb] px-10 py-3 text-sm font-semibold text-white shadow-md shadow-blue-600/25 ring-1 ring-blue-700/15 active:brightness-95">
          去登录
        </a>
      </div>

      <!-- 已登录：筛选 + 列表 -->
      <div id="home-main" class="hidden">
        <div id="device-filters" class="mb-3 flex flex-wrap gap-2" role="toolbar" aria-label="设备筛选">
          <button type="button" data-filter="all" aria-pressed="true" class="filter-chip rounded-full border border-[#2563eb] bg-[#2563eb] px-3.5 py-1.5 text-xs font-medium text-white shadow-sm">所有</button>
          <button type="button" data-filter="online" aria-pressed="false" class="filter-chip rounded-full border border-slate-200 bg-white px-3.5 py-1.5 text-xs font-medium text-slate-700">在线</button>
          <button type="button" data-filter="offline" aria-pressed="false" class="filter-chip rounded-full border border-slate-200 bg-white px-3.5 py-1.5 text-xs font-medium text-slate-700">离线</button>
          <button type="button" data-filter="on" aria-pressed="false" class="filter-chip rounded-full border border-slate-200 bg-white px-3.5 py-1.5 text-xs font-medium text-slate-700">打开</button>
          <button type="button" data-filter="off" aria-pressed="false" class="filter-chip rounded-full border border-slate-200 bg-white px-3.5 py-1.5 text-xs font-medium text-slate-700">关闭</button>
        </div>

        <ul id="device-list" class="space-y-3">
          <li data-online="true" class="device-row rounded-2xl bg-white shadow-sm border border-slate-100 overflow-hidden">
            <div class="flex items-stretch">
              <a href="device-detail.html" class="flex min-h-[5.25rem] flex-1 min-w-0 flex-col justify-start px-4 py-4 active:bg-slate-50">
                <div class="flex items-center gap-2">
                  <h2 class="font-semibold text-slate-900 truncate">客厅灯带</h2>
                  <span class="inline-flex items-center gap-1 rounded-full bg-emerald-50 px-2 py-0.5 text-[11px] font-medium text-emerald-700">
                    <span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span>在线
                  </span>
                </div>
                <div class="schedule-slot mt-1.5 min-h-[1.25rem]">
                  <p class="text-xs text-slate-500 truncate">下一定时 · 今天 22:00 关闭</p>
                </div>
              </a>
              <button type="button" data-demo-switch aria-pressed="true" class="demo-switch-track self-center mr-3" aria-label="快捷开关">
                <span class="demo-knob"></span>
              </button>
            </div>
          </li>
          <li data-online="false" class="device-row rounded-2xl bg-white shadow-sm border border-slate-100 overflow-hidden">
            <div class="flex items-stretch">
              <a href="device-detail.html" class="flex min-h-[5.25rem] flex-1 min-w-0 flex-col justify-start px-4 py-4 active:bg-slate-50">
                <div class="flex items-center gap-2">
                  <h2 class="font-semibold text-slate-900 truncate">车库门</h2>
                  <span class="inline-flex items-center gap-1 rounded-full bg-slate-100 px-2 py-0.5 text-[11px] font-medium text-slate-500">
                    <span class="h-1.5 w-1.5 rounded-full bg-slate-400"></span>离线
                  </span>
                </div>
                <div class="schedule-slot mt-1.5 min-h-[1.25rem]">
                  <p class="text-xs text-slate-500 truncate">下一定时 · 明天 07:30 打开</p>
                </div>
              </a>
              <button type="button" data-demo-switch aria-pressed="false" class="demo-switch-track self-center mr-3" aria-label="快捷开关">
                <span class="demo-knob"></span>
              </button>
            </div>
          </li>
          <li data-online="true" class="device-row rounded-2xl bg-white shadow-sm border border-slate-100 overflow-hidden">
            <div class="flex items-stretch">
              <a href="device-detail.html" class="flex min-h-[5.25rem] flex-1 min-w-0 flex-col justify-center px-4 py-4 active:bg-slate-50">
                <div class="flex items-center gap-2">
                  <h2 class="font-semibold text-slate-900 truncate">备用插座</h2>
                  <span class="inline-flex items-center gap-1 rounded-full bg-emerald-50 px-2 py-0.5 text-[11px] font-medium text-emerald-700">
                    <span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span>在线
                  </span>
                </div>
              </a>
              <button type="button" data-demo-switch aria-pressed="false" class="demo-switch-track self-center mr-3" aria-label="快捷开关">
                <span class="demo-knob"></span>
              </button>
            </div>
          </li>
        </ul>
      </div>
    </main>

    <a id="fab-add-device" href="provision.html" class="hidden fixed bottom-[calc(56px+env(safe-area-inset-bottom,0)+16px)] right-[max(16px,calc(50%-390px/2+16px))] z-50 flex h-14 w-14 items-center justify-center rounded-full bg-[#2563eb] text-white shadow-lg shadow-blue-600/40 ring-2 ring-white active:scale-95 active:brightness-95 transition" aria-label="添加设备">
      <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
    </a>

    <nav class="mp-tabbar" aria-label="主导航">
      <a href="devices.html" class="mp-tab active">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"/></svg>
        <span>首页</span>
      </a>
      <a href="mine.html" class="mp-tab">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <span>我的</span>
      </a>
    </nav>
  </div>
  <script src="js/prototype-nav.js"></script>
  <script>
    (function () {
      var KEY = "sr_proto_logged_in";
      var empty = document.getElementById("home-empty");
      var main = document.getElementById("home-main");
      var fab = document.getElementById("fab-add-device");

      function applyLoginUi() {
        var loggedIn = sessionStorage.getItem(KEY) === "1";
        if (loggedIn) {
          empty.classList.add("hidden");
          main.classList.remove("hidden");
          fab.classList.remove("hidden");
        } else {
          empty.classList.remove("hidden");
          main.classList.add("hidden");
          fab.classList.add("hidden");
        }
      }

      applyLoginUi();

      var CL_CHIP_ON =
        "filter-chip rounded-full border border-[#2563eb] bg-[#2563eb] px-3.5 py-1.5 text-xs font-medium text-white shadow-sm";
      var CL_CHIP_OFF =
        "filter-chip rounded-full border border-slate-200 bg-white px-3.5 py-1.5 text-xs font-medium text-slate-700";

      function applyDeviceFilter(mode) {
        document.querySelectorAll(".device-row").forEach(function (li) {
          var online = li.getAttribute("data-online") === "true";
          var sw = li.querySelector("[data-demo-switch]");
          var relayOn = sw && sw.getAttribute("aria-pressed") === "true";
          var show = true;
          if (mode === "online") show = online;
          else if (mode === "offline") show = !online;
          else if (mode === "on") show = relayOn;
          else if (mode === "off") show = !relayOn;
          li.classList.toggle("hidden", !show);
        });
      }

      var filterRoot = document.getElementById("device-filters");
      if (filterRoot) {
        filterRoot.querySelectorAll(".filter-chip").forEach(function (chip) {
          chip.addEventListener("click", function () {
            var mode = chip.getAttribute("data-filter");
            filterRoot.querySelectorAll(".filter-chip").forEach(function (c) {
              c.setAttribute("aria-pressed", "false");
              c.className = CL_CHIP_OFF;
            });
            chip.setAttribute("aria-pressed", "true");
            chip.className = CL_CHIP_ON;
            applyDeviceFilter(mode);
          });
        });
      }

      document.querySelectorAll(".device-row [data-demo-switch]").forEach(function (sw) {
        sw.addEventListener("click", function () {
          window.setTimeout(function () {
            var active = document.querySelector('.filter-chip[aria-pressed="true"]');
            if (active) applyDeviceFilter(active.getAttribute("data-filter"));
          }, 0);
        });
      });
    })();
  </script>
</body>
</html>
