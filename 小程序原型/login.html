<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <title>登录 — SmartRelay</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {

        extend: {

      }
    };

  <link rel="stylesheet" href="css/prototype-base.css" />

<body class="bg-slate-200">

    <main class="px-6 pt-12 pb-10">

        <h1 class="mt-6 text-xl font-semibold text-slate-900">微联智能</h1>

      <a id="btn-wx-login" href="devices.html" class="flex w-full items-center justify-center gap-2 rounded-xl bg-emerald-500 text-white font-medium py-3.5 shadow-md active:opacity-90">

        登录即表示同意
        <a href="#" class="text-primary">《用户协议》</a>
        与
        <a href="#" class="text-primary">《隐私政策》</a>
      </p>
    </main>
  </div>
  <script>
    document.getElementById("btn-wx-login").addEventListener("click", function () {
      sessionStorage.setItem("sr_proto_logged_in", "1");
    });
  </script>
