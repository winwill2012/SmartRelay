<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />

  <title>操作日志 — SmartRelay</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/prototype-base.css" />
</head>
<body class="bg-slate-200">
  <div class="mp-shell">
    <div class="mp-status">
      <span>9:41</span>

    </div>
    <div class="mp-nav">

    <main class="px-4 pb-8">
      <p class="text-xs text-slate-500 mt-3 mb-4">仅显示最近20条日志</p>

      <ul class="space-y-0 rounded-2xl overflow-hidden border border-slate-100 bg-white">
        <li class="px-4 py-3 border-b border-slate-50 flex justify-between gap-3">
          <div>
            <p class="text-sm text-slate-900">开关 · 打开</p>
            <p class="text-xs text-slate-400 mt-0.5">来源 · 小程序</p>

          <div>
            <p class="text-sm text-slate-900">开关 · 关闭</p>
            <p class="text-xs text-slate-400 mt-0.5">来源 · 定时任务</p>
          </div>
          <time class="text-xs text-slate-500 shrink-0">昨天 22:00</time>
        </li>
        <li class="px-4 py-3 flex justify-between gap-3">
          <div>
            <p class="text-sm text-slate-900">开关 · 打开</p>
            <p class="text-xs text-slate-400 mt-0.5">来源 · 分享用户</p>

</html>
